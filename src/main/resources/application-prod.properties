# ============================================================
# PROD PROFILE  (activate with SPRING_PROFILES_ACTIVE=prod)
# ============================================================

# CORS — set CORS_ALLOWED_ORIGINS env var to your production frontend domain(s)
# e.g. CORS_ALLOWED_ORIGINS=https://app.yourdomain.com

# Swagger locked behind SUPER_ADMIN role in production
swagger.public=false

# Schema: Flyway manages schema; Hibernate validates entities match the DB.
# Fail fast on any mismatch — never auto-modify in production.
spring.jpa.hibernate.ddl-auto=validate

# Suppress SQL and parameter value logging in production
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.com.devvikram.expensetracker=INFO

# Never expose internal error details to clients
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false