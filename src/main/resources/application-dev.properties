# ============================================================
# DEV PROFILE  (activate with SPRING_PROFILES_ACTIVE=dev)
# ============================================================

# Schema: Flyway manages schema; Hibernate validates entities match the DB
spring.jpa.hibernate.ddl-auto=validate

# Verbose SQL logging for debugging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.devvikram.expensetracker=DEBUG

# Expose full error details locally
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.include-exception=true