# Server Configuration
spring.application.name=expensetracker

# Database Configuration
server.port=${PORT:8081}

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

jwt.secret=${JWT_SECRET}
jwt.expiration=900000
jwt.refresh-expiration=604800000

# JPA/Hibernate Configuration
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Flyway — schema migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# baseline-on-migrate: marks existing DBs (created before Flyway) as baselined
# so Flyway doesn't try to re-run V1-V5 on a DB that already has the tables.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=12
spring.flyway.repair-on-migrate=true

# Flyway — schema migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# baseline-on-migrate: marks existing DBs (created before Flyway) as baselined
# so Flyway doesn't try to re-run V1-V5 on a DB that already has the tables.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0


# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000



# CORS — comma-separated allowed origins (override via env var in prod)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Swagger — set to false in prod profile to restrict behind SUPER_ADMIN role
swagger.public=true

# Logging Configuration (shared across all profiles)
logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=INFO
# SQL and error detail levels are set per profile: see application-dev.properties / application-prod.properties

# Actuator (for health checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Multipart upload limits (max 5 MB per file)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB