# Server Configuration
spring.application.name=expensetracker

# Database Configuration
server.port=${PORT:8081}

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# Flyway — schema migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# baseline-on-migrate: marks existing DBs (created before Flyway) as baselined
# so Flyway doesn't try to re-run V1-V5 on a DB that already has the tables.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0


# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000



# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin123

# Logging Configuration (shared across all profiles)
logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=INFO
# SQL and error detail levels are set per profile: see application-dev.properties / application-prod.properties

# Actuator (for health checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized