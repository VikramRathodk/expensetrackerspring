server.port=8081
spring.application.name=expensetracker


spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/expensetracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:expenseuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:expensepass}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}



spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect




# JWT Configuration
jwt.secret=mySecretKeyForJwtTokenGenerationMustBe256BitsLongForHS256AlgorithmSecureKey123
jwt.expiration=86400000


# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin123


# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.devvikram.expensetracker=DEBUG

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false





