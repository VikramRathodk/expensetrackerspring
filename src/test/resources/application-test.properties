# ── H2 in-memory datasource (replaces PostgreSQL) ─────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ── Disable Flyway (DDL is handled by Hibernate in tests) ─────────────────────
spring.flyway.enabled=false

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=test-secret-key-that-is-at-least-32-characters-long-for-hs256
jwt.expiration=3600000

# ── Suppress noisy logs ───────────────────────────────────────────────────────
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.com.devvikram=WARN
