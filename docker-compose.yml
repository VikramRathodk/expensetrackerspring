version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: expensetracker-db
    environment:
      POSTGRES_DB: expensetracker
      POSTGRES_USER: expenseuser
      POSTGRES_PASSWORD: expensepass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - expensetracker-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expenseuser -d expensetracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: expensetracker-app
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/expensetracker
      SPRING_DATASOURCE_USERNAME: expenseuser
      SPRING_DATASOURCE_PASSWORD: expensepass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
    networks:
      - expensetracker-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres-data:

networks:
  expensetracker-network:
    driver: bridge